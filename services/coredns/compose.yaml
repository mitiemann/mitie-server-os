services:
  coredns:
    image: docker.io/coredns/coredns:latest
    container_name: coredns
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    # Bind only to the Netbird interface — not exposed on LAN or localhost.
    # SERVER_NETBIRD_IP must match the server's current Netbird IP.
    ports:
      - "${SERVER_NETBIRD_IP}:53:53/udp"
      - "${SERVER_NETBIRD_IP}:53:53/tcp"
    volumes:
      - ./Corefile:/etc/coredns/Corefile:ro
      - ./service-hosts:/etc/coredns/service-hosts:ro
    cap_add:
      - NET_BIND_SERVICE
