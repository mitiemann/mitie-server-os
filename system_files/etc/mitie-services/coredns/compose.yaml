services:
  coredns:
    image: docker.io/coredns/coredns:latest
    container_name: coredns
    restart: unless-stopped
    command: -conf /etc/coredns/Corefile
    # Bind to all interfaces; access is restricted to the Netbird zone
    # by firewalld (dns service only allowed on wt0).
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - /etc/mitie-services/coredns/Corefile:/etc/coredns/Corefile:ro
      - /etc/mitie-services/coredns/service-hosts:/etc/coredns/service-hosts:ro
    cap_add:
      - NET_BIND_SERVICE
