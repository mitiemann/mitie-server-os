[customizations.installer.kickstart]
contents = """
text
lang en_US.UTF-8
zerombr
clearpart --all --initlabel --disklabel=gpt
autopart --noswap
reboot

%post
# Create user with wheel access; password login disabled.
# SSH keys are baked into the image at /etc/ssh/authorized_keys.d/mitiemann.
useradd -G wheel -p '!' mitiemann

# Set bootc origin so the system tracks the registry for future upgrades.
bootc switch --mutate-in-place --transport registry ghcr.io/mitiemann/mitie-server-os:latest
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
]
disable = [
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Subscription",
  "org.fedoraproject.Anaconda.Modules.Timezone",
]
